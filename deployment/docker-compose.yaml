version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: contact_manager
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d contact_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://user:password@postgres/contact_manager
      SECRET_KEY: your-secret-key-change-this
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
